testimonials:
  - quote: "Avec une grande capacité de compréhension de l'ensemble des process spécifiques à notre secteur d'activité, Team UX a parfaitement su répondre aux besoins de nos différents métiers. Merci à Daniela et à Yuna pour leur dynamisme, leur réactivité et leur professionnalisme."
    author: "Dominique Barillot, ingénieur commercial chez Sys1"
  - quote: "Team UX a su prendre en charge l'ergonomie et le graphisme de LOGUS avec la plus grande efficacité et professionnalisme. Nous avons énormément apprécié la collaboration et notamment la réactivité, la disponibilité dont Team UX a fait preuve et surtout les idées qu'elles ont présentées. L'équipe a pris en compte nos contraintes temporelles, techniques et organisationnelles afin de répondre au mieux à notre besoin. Notre logiciel se modernise, les interfaces sont plus belles, l'ergonomie est plus travaillée et ce tout en gardant son identité et son ADN propre. Des échanges très riches. C'est un réel plaisir de pouvoir collaborer et travailler ensemble dans un cadre agréable et organisé."
    author: "Julien Narboni, chef de projets technico-fonctionnel chez Sys1"
