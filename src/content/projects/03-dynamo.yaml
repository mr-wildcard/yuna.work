testimonials:
  - quote: "Nous avons fait appel à Yuna pour évaluer des parcours utilisateurs sous l'angle de l'accessibilité et nous guider sur la mise en oeuvre des bonnes pratiques. Cette collaboration s'est révélée être une expérience extrêmement enrichissante pour nos designers. Yuna a démontré une expertise de premier ordre, qu'elle a partagée avec notre équipe avec beaucoup de pertinence et de générosité."
    author: "Philippe Cossé, directeur associé chez dynamo"
  - quote: "J'ai eu le plaisir de collaborer avec Yuna sur la création d'un site web pour lequel l'accessibilité était un enjeu essentiel. Nous avons itéré ensemble pendant toute la phase de conception UX pour s'assurer que les normes d'accessibilité étaient respectées et implémentées. C'était une expérience particulièrement intéressante qui m'a permis d'aborder mon travail avec un nouveau regard. J'ai beaucoup apprécié travailler avec Yuna dont les contributions et le professionnalisme ont été des atouts précieux."
    author: "Inès Chopin, <span lang='en'>UX designer</span> senior chez dynamo"
  - quote: "Yuna fait partie de ces perles rares dans le milieu professionnel, à la fois passionnée et experte dans son domaine mais aussi très curieuse d'autres disciplines, avec une attitude pédagogue et toujours très humble. J'ai eu l'opportunité de faire appel à ses services durant la conception UI d'une application B2B impliquant diverses formes de visualisation de données. Yuna m'a fourni une analyse fine et très concrète des maquettes que je lui ai soumises. Notre échange m'a permis d'améliorer mon design jusqu'au moindre détail afin de le mettre en conformité avec les normes d'accessibilité."
    author: "Nikita Vidal, <span lang='en'>UX/UI designer</span> senior chez dynamo"
