testimonials:
  - quote: "J'ai découvert Yuna & Daniela grâce au réseau Opquast, dont nous sommes toutes trois certifiées. Elles ont démontré efficacité et pertinence en accompagnant mon équipe dans leur montée en compétence en accessibilité numérique. Grâce à leur expertise et leurs conseils avisés, nous avons pu mener rapidement à bien la mise en conformité RGAA d'interfaces clés pour nos produits B2B. Leur contribution a été très appréciée par l'équipe, avec qui elles ont collaboré de manière très fluide."
    author: "Aurore Bourdier, Head of Design chez Infopro Digital"
