testimonials:
  - quote: "Nous avons fait appel à Yuna pour la conception de notre application web à destination des collectivités sur la prévision des inondations. Le projet était particulier et complexe car il mélange des connaissances métier sur les inondations avec un outil d'aide à la décision simple, intuitif et surtout inclusif. Yuna a été très à l'aise avec cette complexité et a su proposer différentes pistes d'UX afin de répondre aux besoins des utilisateurs. Les maquettes livrées sont de très haute qualité avec des annotations qui ont permis à notre équipe de développement d'être efficace dans le développement."
    author: "Fabien Rétif, fondateur et directeur technique de Snale"
